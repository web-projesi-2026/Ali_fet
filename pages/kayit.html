<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol | Ali Fet</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="preloader"><div class="loader"></div></div>
    <div class="particles"></div>

    <nav class="navbar">
        <a href="../index.html" class="logo">Ali Fet</a>
        <ul class="nav-links">
            <li><a href="../index.html">Anasayfa</a></li>
            <li><a href="hakkimda.html">Hakkımda</a></li>
            <li><a href="projeler.html">Projeler</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="iletisim.html">İletişim</a></li>
        </ul>
        <div class="nav-right">
            <a href="giris.html" class="btn btn-outline">Giriş Yap</a>
            <a href="kayit.html" class="btn btn-primary active">Kayıt Ol</a>
            <a href="iletisim.html" class="btn btn-secondary">İletişime Geç</a>
        </div>
        <div class="mobile-menu-btn"><span></span><span></span><span></span></div>
    </nav>

    <div class="auth-container">
        <div class="auth-box">
            <h2>Hesap Oluştur 🚀</h2>
            <p class="subtitle">Hemen ücretsiz kayıt olun</p>

            <form id="kayitForm" autocomplete="on">
                <div class="form-group">
                    <i class="fas fa-user"></i>
                    <label for="ad_soyad">Ad Soyad</label>
                    <input type="text" id="ad_soyad" name="ad_soyad"
                           placeholder="Adınız ve soyadınız" required autocomplete="name">
                </div>
                <div class="form-group">
                    <i class="fas fa-envelope"></i>
                    <label for="email">E-posta</label>
                    <input type="email" id="email" name="email"
                           placeholder="E-posta adresiniz" required autocomplete="email">
                </div>
                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <label for="sifre">Şifre</label>
                    <input type="password" id="sifre" name="sifre"
                           placeholder="Şifre (min. 8 karakter)" required
                           minlength="8" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <label for="sifre_tekrar">Şifre Tekrar</label>
                    <input type="password" id="sifre_tekrar" name="sifre_tekrar"
                           placeholder="Şifrenizi tekrar girin" required autocomplete="new-password">
                </div>
                <div class="form-options">
                    <label>
                        <input type="checkbox" required>
                        <a href="#">Kullanım şartlarını</a> kabul ediyorum
                    </label>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-user-plus"></i> Kayıt Ol
                </button>
            </form>

            <div class="auth-footer">
                Zaten hesabınız var mı? <a href="giris.html">Giriş Yapın</a>
            </div>
        </div>
    </div>

    <script src="../assets/js/main.js"></script>
</body>
</html>
